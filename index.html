    <style>
        html, body { height: 100%; background: #fff; }
        body {
            font-family: "PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
            color: #111;
            -webkit-font-smoothing: antialiased;
        }
        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            text-align: center;
        }
        .page > * { flex-shrink: 0; }
        .spacer { flex: 1 0 auto; min-height: 40px; }

        /* Logo */
        .logo {
            width: 72px; height: 72px;
            border-radius: 18px;
            background: linear-gradient(135deg,#e74c3c,#3498db);
            margin: 0 auto 32px;
        }
        .logo i {
            font-size: 34px; color: #fff; line-height: 72px;
        }

        /* 标题 */
        h1 { font-size: 28px; font-weight: 300; letter-spacing: 6px; margin: 0 0 8px; }
        h1 strong {
            font-weight: 600;
            background: linear-gradient(135deg,#e74c3c,#3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.desc {
            font-size: 13px; color: #bbb; letter-spacing: 4px; margin: 0 0 48px;
        }

        /* 按钮 */
        .btns { text-align: center; }
        .btn {
            display: inline-block;
            min-width: 160px;
            padding: 12px 32px;
            border-radius: 50px;
            font-size: 14px; letter-spacing: 2px;
            color: #fff; text-decoration: none;
            margin: 0 8px 12px;
            transition: all .2s;
        }
        .btn:hover,.btn:focus { color:#fff; text-decoration:none; opacity:.9; }
        .btn-a { background: linear-gradient(135deg,#e74c3c,#db5a4b); }
        .btn-b { background: linear-gradient(135deg,#3498db,#5dade2); }

        /* 版本 */
        .ver {
            margin-top: 28px;
            font-size: 11px; color: #ccc; letter-spacing: 2px;
        }

        /* 底部 */
        .footer {
            width: 100%;
            padding: 20px 0;
            font-size: 12px; color: #ccc; letter-spacing: 1px;
        }
        .footer a { color: #ccc; text-decoration: none; }

        @media (max-width: 480px) {
            h1 { font-size: 22px; letter-spacing: 4px; }
            .logo { width: 60px; height: 60px; border-radius: 14px; }
            .logo i { font-size: 28px; line-height: 60px; }
            p.desc { font-size: 12px; letter-spacing: 2px; margin-bottom: 36px; }
            .btn { display: block; margin: 0 auto 10px; max-width: 240px; }
        }
    </style>
</head>
<body>

<div class="page">

    <div class="spacer"></div>

    <!-- 图标 -->
    <div class="logo">

        <a href="#" class="btn btn-b"><i class="fa fa-apple"></i> 微信小程序 </a>
    </div>

    <p class="ver">v1.0.0  ·  Android / iOS</p>

    <div class="spacer"></div>

    <!-- 底部 -->

</div>
